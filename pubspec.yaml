name: cairn
description: "Grow a streak for every day you don't open a tracked app. On-device, no accounts."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1
  go_router: ^17.3.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  package_info_plus: ^8.0.0
  # Opens outbound links (source repo, F-Droid, tip page) in the system browser.
  # Cairn itself stays network-free: it hands a URL to the browser, sending no
  # data of its own. url_launcher adds no INTERNET permission, only <queries>.
  url_launcher: ^6.3.0
  # Hands a summit recap to the OS share sheet. The chosen target app does the
  # sending; Cairn transmits nothing and gains no INTERNET permission.
  share_plus: ^11.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  riverpod_generator: ^4.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

# Launcher icon generation (`dart run flutter_launcher_icons`). Sources derived
# from assets/cairn_icon.png with the white export margin keyed out; the adaptive
# background matches the icon's own dark green so it masks seamlessly. minSdk 26
# means every device uses the adaptive icon.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/launcher/ic_legacy.png"
  adaptive_icon_background: "#30372F"
  adaptive_icon_foreground: "assets/launcher/ic_foreground.png"
  min_sdk_android: 26

# Boot splash (`dart run flutter_native_splash:create`). Replaces the default
# black system splash with Cairn's own dark canvas (#181D18) and the cairn mark.
# On Android 12+ the icon circle uses the same canvas colour, so the mark appears
# to rest on the app background with no harsh plate — calm and on-brand. Dark and
# light both use the canvas because Cairn is dark-first.
flutter_native_splash:
  android: true
  ios: false
  web: false
  color: "#181D18"
  color_dark: "#181D18"
  image: "assets/cairn_building.png"
  android_12:
    color: "#181D18"
    color_dark: "#181D18"
    # 1152x1152 with the mascot inside the 768px safe circle, so Android 12's
    # circular icon mask never crops it (a raw square mascot gets zoomed + cut).
    image: "assets/launcher/splash_mascot.png"
    icon_background_color: "#181D18"
    icon_background_color_dark: "#181D18"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # The living-cairn mascot + modular stones. Never redraw — always reference these.
  assets:
    - assets/cairn_building.png
    - assets/cairn_proud.png
    - assets/cairn_reset.png
    - assets/cairn_summit.png
    - assets/cairn_icon.png
    - assets/stone_sand.png
    - assets/stone_grey.png
    - assets/stone_sage.png

  # Bundled OFL fonts (no runtime fetch → F-Droid/offline friendly, PRD §11).
  # Hanken Grotesk ships as a single variable font; weights are selected via
  # FontVariation('wght', n) in the text theme (see core/theme/cairn_typography.dart).
  fonts:
    - family: Hanken Grotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk-Variable.ttf
    - family: Space Mono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
